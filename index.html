<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-scaffold</title>
    <!-- Anti-FOUC: read localStorage['theme'] (or fall back to prefers-color-scheme)
         and apply the `dark` class to <html> synchronously before any CSS paint.
         Must stay in sync with ThemeProvider's resolveInitialTheme() precedence. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          if (
            t === 'dark' ||
            (!t && matchMedia('(prefers-color-scheme: dark)').matches)
          ) {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
