    <!-- Anti-FOUC: read localStorage['theme'] (or fall back to prefers-color-scheme)
         and apply the `dark` class to <html> synchronously before any CSS paint.
         Must stay in sync with ThemeProvider's resolveInitialTheme() precedence. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          if (
            t === 'dark' ||
            (!t && matchMedia('(prefers-color-scheme: dark)').matches)
          ) {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {}
      })()
    </script>
  </head>
  <body>

    <script type="module" src="/src/main.tsx"></script>
  </body>
