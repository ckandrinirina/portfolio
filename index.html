    <!-- Anti-FOUC data-theme bootstrap — runs before React so the correct
         palette is applied on first paint. MUST stay byte-in-sync with
         THEME_BOOTSTRAP in src/theme/themeBootstrap.ts (enforced by a test). -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('theme')
          var prefersDark = matchMedia('(prefers-color-scheme: dark)').matches
          var t = stored || (prefersDark ? 'default' : 'paper')
          if (t !== 'default')
            document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
